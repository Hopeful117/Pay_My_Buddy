<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Relation</title>
    <link rel="stylesheet" th:href="@{/navbar.css}">
    <link rel="stylesheet" th:href="@{/messages.css}">
    <link rel="stylesheet" th:href="@{/relations.css}">
</head>
<body>
<header th:replace="~{navbar :: navbar(currentPage=${currentPage})}"></header>
<main>
    <form method="post" th:action="@{/relations}">

        <label>
            <span>Chercher une relation</span>
            <input placeholder="Saisir une adresse mail" th:name="email" type="email">

        </label>
        <button class="AddBtn" type="submit">Ajouter</button>
    </form>
    <div th:replace="~{messages :: messages}"></div>
</main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>messages</title>

</head>
<body>

<div th:fragment="messages">
    <!-- Liste d'erreurs métier -->
    <div class="alert alert-error"
         th:if="${errors != null and !#lists.isEmpty(errors)}">
        <ul>
            <li class="error" th:each="err : ${errors}" th:text="${err}"></li>
        </ul>
    </div>

    <!-- Message de succès -->
    <div class="alert alert-success" th:if="${success != null}">
        <p class="success" th:text="${success}"></p>
    </div>
</div>


</body>
</html>
